<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">🎮</div>
        <h1>Mentro</h1>
        <p>היועץ האישי שלך לגיימינג</p>
      </div>

      <button class="nav-btn active" data-page="home">🏠 בית</button>
      <button class="nav-btn" data-page="profile">👤 פרופיל</button>
      <button class="nav-btn" data-page="games">🎮 המשחקים שלי</button>
      <button class="nav-btn" data-page="advice">💡 ייעוץ</button>
      <button class="nav-btn" data-page="recommend">⭐ המלצות</button>
      <button class="nav-btn" data-page="tech">🔧 עזרה טכנית</button>
      <button class="nav-btn" data-page="info">📚 מידע משחקים</button>
      <button class="nav-btn" data-page="shop">🛒 חנות</button>
    </aside>

    <main class="content">
      <section id="home" class="page active-page">
        <h2 id="helloTitle">שלום 👋</h2>

        <div class="stats">
          <div class="stat">🔥 רצף ימים<br><b id="streakBox">0</b></div>
          <div class="stat">💎 יהלומים<br><b id="gemsBox">0</b></div>
          <div class="stat">🎮 משחקים<br><b id="gamesCountBox">0</b></div>
        </div>

        <div class="card">
          <h3>היום ב־Mentro</h3>
          <div id="todayBox" class="answer"></div>
        </div>

        <div class="card">
          <h3>טיפ יומי</h3>
          <div id="dailyTip" class="answer clickable"></div>
          <div id="tipDetails" class="answer hidden"></div>
        </div>
      </section>

      <section id="profile" class="page">
        <h2>הפרופיל שלי</h2>

        <div class="card">
          <label>שם</label>
          <input id="playerName" placeholder="למשל דניאל" />

          <label>אימייל</label>
          <input id="playerEmail" type="email" placeholder="name@email.com" />

          <label>הקונסולות שלי</label>
          <div class="checkbox-grid">
            <label><input type="checkbox" class="platform-check" value="nintendo"> Nintendo</label>
            <label><input type="checkbox" class="platform-check" value="playstation"> PlayStation</label>
            <label><input type="checkbox" class="platform-check" value="xbox"> Xbox</label>
            <label><input type="checkbox" class="platform-check" value="pc"> PC</label>
            <label><input type="checkbox" class="platform-check" value="mobile"> Mobile</label>
          </div>

          <label>הסגנון שלי</label>
          <input id="customStyle" placeholder="למשל אוהב קרבות, לבנות, לאסוף דמויות, לשחק רגוע..." />

          <button id="saveProfileBtn">שמור פרופיל</button>
        </div>
      </section>

      <section id="games" class="page">
        <h2>המשחקים שלי</h2>

        <div class="card">
          <label>בחר משחק להוסיף</label>
          <select id="addGameSelect">
            <option value="">בחר משחק</option>
          </select>
          <button id="addGameBtn">הוסף משחק</button>
        </div>

        <div id="myGamesList" class="game-grid"></div>
      </section>

      <section id="advice" class="page">
        <h2>יועץ משחקים</h2>

        <div class="card">
          <label>בחר משחק</label>
          <select id="adviceGameSelect">
            <option value="">בחר משחק</option>
          </select>

          <label>כתוב שאלה</label>
          <textarea id="adviceInput" placeholder="לדוגמה: אני אוהב להילחם ולבנות, מה עדיף לי לשפר?"></textarea>

          <button id="adviceBtn">תן לי עצה</button>
          <div id="adviceOutput" class="answer"></div>
        </div>
      </section>

      <section id="recommend" class="page">
        <h2>המלצות בשבילך</h2>

        <div class="card">
          <button id="recommendBtn">מצא לי משחקים מתאימים</button>
          <div id="recommendOutput" class="game-grid"></div>
        </div>
      </section>

      <section id="tech" class="page">
        <h2>עזרה טכנית</h2>

        <div class="card">
          <label>מכשיר</label>
          <select id="techPlatform">
            <option value="">בחר מכשיר</option>
            <option value="nintendo">Nintendo</option>
            <option value="playstation">PlayStation</option>
            <option value="xbox">Xbox</option>
            <option value="pc">PC</option>
            <option value="mobile">Mobile</option>
          </select>

          <label>משחק</label>
          <select id="techGameSelect">
            <option value="">בחר משחק</option>
          </select>

          <label>מה הבעיה?</label>
          <textarea id="techInput" placeholder="המשחק קורס / אין אינטרנט / DLC לא עובד / השלט לא מתחבר"></textarea>

          <button id="techBtn">פתור בעיה</button>
          <div id="techOutput" class="answer"></div>
        </div>
      </section>

      <section id="info" class="page">
        <h2>מידע על משחקים</h2>

        <div class="card">
          <select id="infoGameSelect">
            <option value="">בחר משחק</option>
          </select>
          <div id="infoOutput" class="answer"></div>
        </div>
      </section>

      <section id="shop" class="page">
        <h2>חנות</h2>

        <div class="shop-grid">
          <div class="shop-item">
            <div class="shop-preview glow-preview">Mentro</div>
            <h3>שם זוהר</h3>
            <p>30 💎</p>
            <button data-buy="glow">קנה</button>
          </div>

          <div class="shop-item">
            <div class="avatar-preview">🧙‍♂️</div>
            <h3>אווטאר קוסם</h3>
            <p>50 💎</p>
            <button data-buy="wizard">קנה</button>
          </div>

          <div class="shop-item">
            <div class="avatar-preview">🤖</div>
            <h3>אווטאר רובוט</h3>
            <p>50 💎</p>
            <button data-buy="robot">קנה</button>
          </div>

          <div class="shop-item">
            <div class="avatar-preview">🔥</div>
            <h3>תג אש</h3>
            <p>40 💎</p>
            <button data-buy="fire">קנה</button>
          </div>
        </div>

        <div id="shopMessage" class="answer"></div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
